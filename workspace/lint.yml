# ══════════════════════════════════════════
#  GitHub Actions — Lint and Test
#
#  What's going on:
#    Every time you push code or open a PR, this workflow:
#    1. Sets up Python
#    2. Installs dependencies
#    3. Runs a linter (flake8) to check code style
#    4. Runs unit tests (pytest)
#
#    This catches bugs and style issues BEFORE they get merged.
# ══════════════════════════════════════════

name: Lint & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Treat all other issues as warnings
          flake8 . --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short